name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish a GitHub Release from this run"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build-macos:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            arch: arm64
          - runner: macos-26-intel
            arch: x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          brew install ffmpeg
          mkdir -p Resources/ffmpeg
          cp "$(brew --prefix ffmpeg)/bin/ffmpeg" Resources/ffmpeg/ffmpeg
          chmod +x Resources/ffmpeg/ffmpeg

      - name: Build
        run: swift build --arch "${{ matrix.arch }}"

      - name: Test
        run: swift test

      - name: Package app
        run: scripts/package_app.sh --arch "${{ matrix.arch }}"

      - name: Package DMG
        run: scripts/package_dmg.sh --arch "${{ matrix.arch }}"

      - name: Verify app bundle
        run: |
          test -x "dist/Video2MP3.app/Contents/MacOS/Video2MP3"
          test -x "dist/Video2MP3.app/Contents/Resources/ffmpeg"
          codesign --verify --deep --strict "dist/Video2MP3.app"
          test -s "dist/Video2MP3-macOS-${{ matrix.arch }}.zip"
          test -s "dist/Video2MP3-macOS-${{ matrix.arch }}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Video2MP3-macOS-${{ matrix.arch }}
          path: |
            dist/Video2MP3-macOS-${{ matrix.arch }}.zip
            dist/Video2MP3-macOS-${{ matrix.arch }}.dmg

  publish:
    name: Publish release
    needs: build-macos
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ !startsWith(github.ref, 'refs/tags/') }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('manual-{0}', github.run_number) }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('Manual build {0}', github.run_number) }}
          files: |
            artifacts/**/*.zip
            artifacts/**/*.dmg
          body: |
            ## Video2MP3 v0.1.0

            推荐下载 DMG 安装包，选择与你的 Mac 芯片匹配的版本：

            - `Video2MP3-macOS-arm64.dmg`：Apple Silicon，M 系列芯片。
            - `Video2MP3-macOS-x86_64.dmg`：Intel Mac。

            打开 DMG 后，将 `Video2MP3.app` 拖到 `Applications`。zip 附件也保留为备用下载方式。

            这个版本使用 ad-hoc signing，尚未 notarize。首次打开时，如果 macOS 阻止启动，请在“系统设置 > 隐私与安全性”中允许打开，或在 Finder 中右键 app 后选择“打开”。

            已知限制：只输出 MP3，码率固定为 192k；暂不提供 App Store 版本；ffmpeg 授权说明见仓库中的 THIRD_PARTY_NOTICES.md。
